<!doctype html>
<html>
<head>
  <title>Tamil Learning App - AI Upgrade</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
      text-align: center;
    }

    h1 {
      background: #4caf50;
      color: white;
      padding: 15px;
      margin: 0;
      font-size: 45px;
    }

    .controls {
      margin: 20px;
    }

    input,
    select {
    padding: 13px;
    margin: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 20px;
    }

    button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #4caf50;
    color: white;
    font-size: 22px;  
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }

.card {
  background: white;
  padding: 15px;
  width: 160px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  cursor: pointer;

  /* NEW */
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}

.tamil {
  font-size: 18px;
  font-weight: bold;

  /* NEW */
  word-break: break-word;
}

.english {
  color: gray;
  font-size: 14px;

  /* NEW */
  word-break: break-word;
}

    .deleteBtn {
      margin-top: 8px;
      background: #ff4d4d;
    }
    .deleteBtn:hover {
    background: #e60000;
}
    .time {
  font-size: 11px;
  color: gray;
  margin-top: 6px;
}
          #dashboardBox {
        background: #fff;
        padding: 10px;
        margin: 10px;
        border-radius: 8px;
        font-size: 45px;
      }
      .listening {
  background: red !important;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {
    transform: scale(1);
  }

  50% {
    transform: scale(1.1);
  }

  100% {
    transform: scale(1);
  }
}
  </style>
</head>

<body>

<h1>📚 AI Tamil Learning App</h1>

  <!-- DASHBOARD -->
    <div id="dashboardBox"></div>

<!-- INPUT -->
<div class="controls">

  <input type="text" id="tamilInput" placeholder="Tamil text">
  <button onclick="startListening('tamil')">🎤 Tamil</button>

  <input type="text" id="englishInput" placeholder="English text">
  <button onclick="startListening('english')">🎤 English</button>

  <br>

  <select id="typeInput">
    <option value="number">Number</option>
    <option value="word">Word</option>
    <option value="sentence">Sentence</option>
  </select>

  <button onclick="addItem()">Add</button>

</div>

<!-- SEARCH -->
<div class="controls">
  <input type="text" id="searchInput" placeholder="Search...">

  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('number')">Numbers</button>
  <button onclick="filterCategory('word')">Words</button>
  <button onclick="filterCategory('sentence')">Sentences</button>
</div>

<!-- CARDS -->
<div class="card-container" id="cardContainer"></div>

<script>

// ================= DATA =================
let data = JSON.parse(localStorage.getItem("tamilData")) || [];

// ================= SAVE =================
function saveData() {
  localStorage.setItem("tamilData", JSON.stringify(data));
}

// ================= INITIAL DATA =================
if (data.length === 0) {
  let numbers = ["ஒன்று","இரண்டு","மூன்று","நான்கு","ஐந்து","ஆறு","ஏழு","எட்டு","ஒன்பது","பத்து"];

  numbers.forEach((num, i) => {
    data.push({
      tamil: num,
      english: (i + 1).toString(),
      type: "number"
    });
  });

  saveData();
}

// ================= 🗑️ DELETE =================
function deleteItem(index) {
  if (confirm("Are You Sure to Delete this item?")) {
    data.splice(index, 1);
    saveData();
    renderCards();
  }
}

// ================= 🌍 TRANSLATION =================
async function translateText(text, from, to) {
  try {
    let res = await fetch(
      `https://api.mymemory.translated.net/get?q=${text}&langpair=${from}|${to}`
    );

    let data = await res.json();

    return data.responseData.translatedText;
  } catch {
    return text;
  }
}

// ================= 🧠 GRAMMAR FIX (AI STYLE) =================
function basicGrammarFix(text) {
  return text
    .replace(/\bi\b/g, "I")
    .replace(/^./, c => c.toUpperCase())
    .trim();
}

function startListening(type) {

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Speech not supported");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = type === "tamil" ? "ta-IN" : "en-US";

  recognition.continuous = false;
  recognition.interimResults = false;

  // GET BUTTON
  let buttons = document.querySelectorAll("button");

  let micButton;

  if (type === "tamil") {
    micButton = buttons[0];
  } else {
    micButton = buttons[1];
  }

  recognition.start();

  // MIC ON
  recognition.onstart = () => {
    micButton.classList.add("listening");
    micButton.innerText = "🎙 Listening...";
  };

  // RESULT
  recognition.onresult = async (event) => {

    let spokenText = event.results[0][0].transcript;

    if (type === "tamil") {

      document.getElementById("tamilInput").value = spokenText;

      let english = await translateText(spokenText, "ta", "en");

      document.getElementById("englishInput").value = english;

    } else {

      document.getElementById("englishInput").value = spokenText;

      let tamil = await translateText(spokenText, "en", "ta");

      document.getElementById("tamilInput").value = tamil;
    }
  };

  // MIC OFF
  recognition.onend = () => {

    micButton.classList.remove("listening");

    if (type === "tamil") {
      micButton.innerText = "🎤 Tamil";
    } else {
      micButton.innerText = "🎤 English";
    }
  };

  recognition.onerror = (e) => {
    console.log("Speech error:", e.error);

    micButton.classList.remove("listening");

    if (type === "tamil") {
      micButton.innerText = "🎤 Tamil";
    } else {
      micButton.innerText = "🎤 English";
    }
  };
}

// ================= ADD =================
function addItem() {

  let tamil = document.getElementById("tamilInput").value.trim();
  let english = document.getElementById("englishInput").value.trim();
  let type = document.getElementById("typeInput").value;

  if (!tamil || !english) {
    alert("Enter both fields");
    return;
  }

  data.push({
  tamil,
  english,
  type,
  createdAt: getDateTime()
});

  saveData();
  renderCards();

  document.getElementById("tamilInput").value = "";
  document.getElementById("englishInput").value = "";
}

// ================= FILTER =================
let currentFilter = "all";

function filterCategory(type) {
  currentFilter = type;
  renderCards();
}

// ================= RENDER =================
function renderCards() {

  let container = document.getElementById("cardContainer");
  let search = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  data.forEach((item, index) => {

    if (
      (currentFilter === "all" || item.type === currentFilter) &&
      (item.tamil.includes(search) ||
        item.english.toLowerCase().includes(search))
    ) {

      let card = document.createElement("div");
      card.className = "card";

      card.onclick = () => speak(item.tamil);

      card.innerHTML = `
        <div class="tamil">${item.tamil}</div>
        <div class="english">${item.english}</div>
        <div class="time">${item.createdAt || ""}</div>

        <button class="deleteBtn" onclick="deleteItem(${index})">
          🗑️ Delete
        </button>
      `;

      container.appendChild(card);
    }
  });
  updateDashboard();
}

// ================= SPEAK =================
function speak(text) {

  let audio = new Audio(
    "https://translate.google.com/translate_tts?ie=UTF-8&q=" +
      encodeURIComponent(text) +
      "&tl=ta&client=tw-ob"
  );

  audio.play().catch(() => {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "ta-IN";
    speechSynthesis.speak(speech);
  });
}

  // ================= date =================
  function getDateTime() {

  let now = new Date();

  return now.toLocaleString("en-IN", {
    dateStyle: "medium",
    timeStyle: "short"
  });
}
        // ================= DASHBOARD =================
      function updateDashboard() {
        let total = data.length;
        let fav = data.filter((i) => i.favorite).length;
        let num = data.filter((i) => i.type === "number").length;
        let word = data.filter((i) => i.type === "word").length;
        let sent = data.filter((i) => i.type === "sentence").length;

        document.getElementById("dashboardBox").innerHTML =
          `📊 Total: ${total} | 🔢 ${num} | 📖 ${word} | 📝 ${sent}`;
      }

// ================= SEARCH =================
document.getElementById("searchInput").addEventListener("input", renderCards);

// ================= INIT =================
renderCards();

</script>

</body>
</html>
