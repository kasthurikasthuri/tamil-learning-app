<!doctype html>
<html>
<head>
  <title>Tamil Learning App - AI Upgrade</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
      text-align: center;
    }

    h1 {
      background: #4caf50;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .controls {
      margin: 20px;
    }

    input,
    select {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #4caf50;
      color: white;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      width: fit-content;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }

    .tamil {
      font-size: 18px;
      font-weight: bold;
    }

    .english {
      color: gray;
      font-size: 14px;
    }

    .deleteBtn {
      margin-top: 8px;
      background: red;
    }
    .time {
  font-size: 11px;
  color: gray;
  margin-top: 6px;
}
  </style>
</head>

<body>

<h1>📚 AI Tamil Learning App</h1>

<!-- INPUT -->
<div class="controls">

  <input type="text" id="tamilInput" placeholder="Tamil text">
  <button onclick="startListening('tamil')">🎤 Tamil</button>

  <input type="text" id="englishInput" placeholder="English text">
  <button onclick="startListening('english')">🎤 English</button>

  <br>

  <select id="typeInput">
    <option value="number">Number</option>
    <option value="word">Word</option>
    <option value="sentence">Sentence</option>
  </select>

  <button onclick="addItem()">Add</button>

</div>

<!-- SEARCH -->
<div class="controls">
  <input type="text" id="searchInput" placeholder="Search...">

  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('number')">Numbers</button>
  <button onclick="filterCategory('word')">Words</button>
  <button onclick="filterCategory('sentence')">Sentences</button>
</div>

<!-- CARDS -->
<div class="card-container" id="cardContainer"></div>

<script>

// ================= DATA =================
let data = JSON.parse(localStorage.getItem("tamilData")) || [];

// ================= SAVE =================
function saveData() {
  localStorage.setItem("tamilData", JSON.stringify(data));
}

// ================= INITIAL DATA =================
if (data.length === 0) {
  let numbers = ["ஒன்று","இரண்டு","மூன்று","நான்கு","ஐந்து","ஆறு","ஏழு","எட்டு","ஒன்பது","பத்து"];

  numbers.forEach((num, i) => {
    data.push({
      tamil: num,
      english: (i + 1).toString(),
      type: "number"
    });
  });

  saveData();
}

// ================= 🗑️ DELETE =================
function deleteItem(index) {
  if (confirm("Delete this item?")) {
    data.splice(index, 1);
    saveData();
    renderCards();
  }
}

// ================= 🌍 TRANSLATION =================
async function translateText(text, from, to) {
  try {
    let res = await fetch(
      `https://api.mymemory.translated.net/get?q=${text}&langpair=${from}|${to}`
    );

    let data = await res.json();

    return data.responseData.translatedText;
  } catch {
    return text;
  }
}

// ================= 🧠 GRAMMAR FIX (AI STYLE) =================
function basicGrammarFix(text) {
  return text
    .replace(/\bi\b/g, "I")
    .replace(/^./, c => c.toUpperCase())
    .trim();
}

// ================= 🎤 VOICE INPUT =================
function startListening(type) {

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Speech not supported");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = type === "tamil" ? "ta-IN" : "en-US";

  recognition.start();

  recognition.onresult = async (event) => {

    let spokenText = event.results[0][0].transcript;

    // ================= TAMIL → ENGLISH =================
    if (type === "tamil") {

      document.getElementById("tamilInput").value = spokenText;

      let english = await translateText(spokenText, "ta", "en");

      english = basicGrammarFix(english);

      document.getElementById("englishInput").value = english;
    }

    // ================= ENGLISH → TAMIL =================
    else {

      let fixed = basicGrammarFix(spokenText);

      document.getElementById("englishInput").value = fixed;

      let tamil = await translateText(fixed, "en", "ta");

      document.getElementById("tamilInput").value = tamil;
    }
  };

  recognition.onerror = (e) => {
    console.log("Speech error:", e.error);
  };
}

// ================= ADD =================
function addItem() {

  let tamil = document.getElementById("tamilInput").value.trim();
  let english = document.getElementById("englishInput").value.trim();
  let type = document.getElementById("typeInput").value;

  if (!tamil || !english) {
    alert("Enter both fields");
    return;
  }

  data.push({
  tamil,
  english,
  type,
  createdAt: getDateTime()
});

  saveData();
  renderCards();

  document.getElementById("tamilInput").value = "";
  document.getElementById("englishInput").value = "";
}

// ================= FILTER =================
let currentFilter = "all";

function filterCategory(type) {
  currentFilter = type;
  renderCards();
}

// ================= RENDER =================
function renderCards() {

  let container = document.getElementById("cardContainer");
  let search = document.getElementById("searchInput").value.toLowerCase();

  container.innerHTML = "";

  data.forEach((item, index) => {

    if (
      (currentFilter === "all" || item.type === currentFilter) &&
      (item.tamil.includes(search) ||
        item.english.toLowerCase().includes(search))
    ) {

      let card = document.createElement("div");
      card.className = "card";

      card.onclick = () => speak(item.tamil);

      card.innerHTML = `
        <div class="tamil">${item.tamil}</div>
        <div class="english">${item.english}</div>
        <div class="time">${item.createdAt || ""}</div>

        <button class="deleteBtn" onclick="deleteItem(${index})">
          🗑️ Delete
        </button>
      `;

      container.appendChild(card);
    }
  });
}

// ================= SPEAK =================
function speak(text) {

  let audio = new Audio(
    "https://translate.google.com/translate_tts?ie=UTF-8&q=" +
      encodeURIComponent(text) +
      "&tl=ta&client=tw-ob"
  );

  audio.play().catch(() => {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "ta-IN";
    speechSynthesis.speak(speech);
  });
}

  // ================= date =================
  function getDateTime() {

  let now = new Date();

  return now.toLocaleString("en-IN", {
    dateStyle: "medium",
    timeStyle: "short"
  });
}

// ================= SEARCH =================
document.getElementById("searchInput").addEventListener("input", renderCards);

// ================= INIT =================
renderCards();

</script>

</body>
</html>
